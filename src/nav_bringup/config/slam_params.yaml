slam_toolbox:
  ros__parameters:
    use_sim_time: false

    mode: mapping

    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan

    resolution: 0.05
    max_laser_range: 12.0

    minimum_time_interval: 0.2
    transform_timeout: 0.2

    publish_tf: true
    publish_map: true
    map_update_interval: 2.0
