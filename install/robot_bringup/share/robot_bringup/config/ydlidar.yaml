ydlidar:
  ros__parameters:
    port: /dev/ttyUSB0
    baudrate: 115200

    lidar_type: 1
    device_type: 0
    sample_rate: 3
    abnormal_check_count: 4

    resolution_fixed: true
    reversion: false
    inverted: false
    auto_reconnect: true

    isSingleChannel: true
    intensity: true
    support_motor_dtr: true

    angle_min: -3.14159
    angle_max: 3.14159

    range_min: 0.10
    range_max: 12.0

    frequency: 5.0
